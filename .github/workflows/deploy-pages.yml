name: Deploy UI to GitHub Pages

# Publishes the static client-side demo in ui/ to GitHub Pages.
# After the first push, enable Pages once: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload ui/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
